<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Reviews</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --palette-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --border-color: #e5e7eb;
            --item-hover: #f3f4f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 15vh;
            z-index: 10;
        }

        .command-palette {
            width: 100%;
            max-width: 600px;
            background: var(--palette-bg);
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            animation: slideDown 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(-20px);
        }

        @keyframes slideDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-header i {
            color: var(--text-muted);
            font-size: 18px;
            margin-right: 12px;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: var(--text-main);
            background: transparent;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .shortcut-hint {
            font-size: 12px;
            color: var(--text-muted);
            background: #f3f4f6;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .suggestions {
            max-height: 300px;
            overflow-y: auto;
            padding: 8px 0;
        }

        .suggestion-group-title {
            padding: 8px 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text-main);
            text-decoration: none;
        }

        .suggestion-item:hover, .suggestion-item.active {
            background: var(--item-hover);
        }

        .suggestion-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #eef2ff;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }

        .suggestion-text {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
        }

        .suggestion-action {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .suggestion-item:hover .suggestion-action,
        .suggestion-item.active .suggestion-action {
            opacity: 1;
        }

        .footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border-color);
            background: #f9fafb;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer-key {
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-weight: 500;
        }
        
        .error {
            color: #ef4444;
            padding: 12px 20px;
            font-size: 14px;
            background: #fef2f2;
            border-bottom: 1px solid #fee2e2;
        }
        
        .loading {
            display: none;
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
        .loading i {
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="overlay">
    <div class="command-palette">
        <form action="/review" method="POST" id="searchForm">
            <div class="search-header">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" name="product_name" id="searchInput" class="search-input" placeholder="Type a product to search reviews..." autocomplete="off" autofocus>
                <div class="shortcut-hint">
                    <span>⌘</span><span>K</span>
                </div>
            </div>
            
            {% if error %}
            <div class="error">
                <i class="fa-solid fa-circle-exclamation" style="margin-right: 6px;"></i> {{ error }}
            </div>
            {% endif %}
            
            <div id="loading" class="loading">
                <i class="fa-solid fa-circle-notch"></i> Scraping reviews from Flipkart...
            </div>

            <div class="suggestions" id="suggestionsBox">
                <div class="suggestion-group-title">Trending Products</div>
                <div id="suggestionList">
                    <!-- Suggestions injected here via JS -->
                </div>
            </div>

            <div class="footer">
                <div><span class="footer-key">↵</span> to select</div>
                <div><span class="footer-key">↑</span> <span class="footer-key">↓</span> to navigate</div>
                <div><span class="footer-key">esc</span> to close</div>
            </div>
        </form>
    </div>
</div>

<script>
    const products = [
        { name: "iPhone 15 Pro Max", icon: "fa-mobile-screen" },
        { name: "Samsung Galaxy S24 Ultra", icon: "fa-mobile-screen" },
        { name: "MacBook Air M3", icon: "fa-laptop" },
        { name: "Sony WH-1000XM5", icon: "fa-headphones" },
        { name: "AirPods Pro 2", icon: "fa-ear-listen" },
        { name: "PlayStation 5", icon: "fa-gamepad" },
        { name: "Dyson V15 Detect", icon: "fa-broom" },
        { name: "Apple Watch Series 9", icon: "fa-clock" }
    ];

    const searchInput = document.getElementById('searchInput');
    const suggestionList = document.getElementById('suggestionList');
    const searchForm = document.getElementById('searchForm');
    const loading = document.getElementById('loading');
    const suggestionsBox = document.getElementById('suggestionsBox');
    
    let activeIndex = -1;
    let currentFiltered = [...products];

    function renderSuggestions(filtered) {
        suggestionList.innerHTML = '';
        currentFiltered = filtered;
        
        if (filtered.length === 0) {
            suggestionList.innerHTML = `
                <div class="suggestion-item">
                    <div class="suggestion-icon" style="background: #f3f4f6; color: #9ca3af;">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <div class="suggestion-text">Search for "${searchInput.value}"</div>
                    <div class="suggestion-action">↵</div>
                </div>
            `;
            return;
        }

        filtered.forEach((prod, index) => {
            const div = document.createElement('div');
            div.className = `suggestion-item ${index === activeIndex ? 'active' : ''}`;
            div.onclick = () => {
                searchInput.value = prod.name;
                submitForm();
            };
            
            div.innerHTML = `
                <div class="suggestion-icon">
                    <i class="fa-solid ${prod.icon}"></i>
                </div>
                <div class="suggestion-text">${highlightMatch(prod.name, searchInput.value)}</div>
                <div class="suggestion-action">Select</div>
            `;
            suggestionList.appendChild(div);
        });
    }

    function highlightMatch(text, query) {
        if (!query) return text;
        const regex = new RegExp(`(${query})`, 'gi');
        return text.replace(regex, '<span style="color: var(--accent); font-weight: 600;">$1</span>');
    }

    function submitForm() {
        if (!searchInput.value.trim()) return;
        suggestionsBox.style.display = 'none';
        loading.style.display = 'block';
        searchForm.submit();
    }

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        activeIndex = -1;
        const filtered = products.filter(p => p.name.toLowerCase().includes(query));
        
        const groupTitle = document.querySelector('.suggestion-group-title');
        if(query) {
            groupTitle.textContent = 'Search Results';
        } else {
            groupTitle.textContent = 'Trending Products';
        }
        
        renderSuggestions(filtered);
    });

    searchInput.addEventListener('keydown', (e) => {
        const items = suggestionList.querySelectorAll('.suggestion-item');
        
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (activeIndex < currentFiltered.length - 1 || (currentFiltered.length === 0 && activeIndex < 0)) {
                activeIndex++;
                renderSuggestions(currentFiltered);
            }
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (activeIndex > 0) {
                activeIndex--;
                renderSuggestions(currentFiltered);
            }
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (activeIndex >= 0 && currentFiltered[activeIndex]) {
                searchInput.value = currentFiltered[activeIndex].name;
            }
            submitForm();
        }
    });

    // Handle Cmd+K / Ctrl+K
    document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
            e.preventDefault();
            searchInput.focus();
        }
    });

    // Initial render
    renderSuggestions(products);
</script>

</body>
</html>
